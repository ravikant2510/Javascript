<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            flex-direction: column;
            justify-content: center;
            width: 250px;
            height: 250px;
            border: 1px solid #cccccc;
            background-color: #1194f9;
            padding: 15px;
            text-align: center;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;

        }

        .card img {
            width: 100px;
            border-radius: 50%;
        }
    </style>
</head>

<body style="background-color: #212121;">
   

    <div class="card">
        <img class="image" src="">
        <h2 class="name"></h2><br>
        <p class="followers"></p>
    </div>


</body>
<script>
    const requestUrl = 'https://api.github.com/users/ravikant2510'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl);
    xhr.onreadystatechange = function () {
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText)
            console.log(typeof data);
            console.log(data);
            document.querySelector('.image').src = data.avatar_url
            document.querySelector('.name').innerText=data.login
            document.querySelector('.followers').innerText = "Followers "+data.followers
        }
    }

    xhr.send()



</script>

</html>
